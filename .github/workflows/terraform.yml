name: "Terraform & Infrastructure"

on:
  push:
    branches: ["main"]
    paths:
      - "terraform/**"
  pull_request:
    branches: ["main"]
    paths:
      - "terraform/**"
  workflow_dispatch: # Allows manual triggering of the workflow from the GitHub UI.

permissions:
  contents: read
  id-token: write # Mandatory for Workload Identity Federation

jobs:
  terraform:
    name: "Terraform Plan & Apply"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # WHY: This is where the magic happens.
      # GitHub exchanges its OIDC token for a GCP temporary access token.
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan -var="project_id=${{ vars.GCP_PROJECT_ID }}" -no-color

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -var="project_id=${{ vars.GCP_PROJECT_ID }}" -auto-approve
